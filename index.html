<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Sign in — #ENJOY Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://firestore.googleapis.com">
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,500&family=Manrope:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ENJOY Vault">
<script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }</script>
</head>
<body>
<div class="center-screen">
  <div class="auth-card">
    <div class="mark">Private</div>
    <h1>#ENJOY Vault</h1>
    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label>Access code</label>
        <div class="pw-field">
          <input
            type="text"
            id="password"
            class="masked-numeric"
            required
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            data-lpignore="true"
            data-1p-ignore
            data-form-type="other"
            name="entry_field_3x9q">
          <button type="button" class="pw-toggle" id="togglePw" aria-label="Show access code">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Sign in</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>
</div>

<script type="module">
  import { db, ADMIN_PASSWORD, hashPassword, ensureAnonAuth, setAdminSession, isAdminSession } from './firebase-config.js';
  import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Already unlocked on this device -> go straight to dashboard
  if (isAdminSession()) {
    window.location.href = 'dashboard.html';
  }

  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('errorMsg');
  const loginBtn = document.getElementById('loginBtn');
  const pwInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');

  document.getElementById('togglePw').addEventListener('click', () => {
    const nowMasked = pwInput.classList.toggle('masked-numeric');
    eyeIcon.innerHTML = nowMasked
      ? '<path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M3 3l18 18"/><path d="M10.6 5.2A10.8 10.8 0 0 1 12 5c6.4 0 10 7 10 7a17.7 17.7 0 0 1-3.2 4.2M6.4 6.4C4 8 2 12 2 12s3.6 7 10 7c1.4 0 2.6-.3 3.7-.8"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/>';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.textContent = '';
    loginBtn.disabled = true;
    loginBtn.textContent = 'Checking…';
    const entered = pwInput.value.trim();

    if (entered !== ADMIN_PASSWORD) {
      errorMsg.textContent = 'Incorrect access code.';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign in';
      return;
    }

    try {
      const user = await ensureAnonAuth();
      const passwordHash = await hashPassword(entered);

      // First-ever login on a freshly deployed site: config/security
      // doesn't exist yet, so this writes it once. Every login after
      // that, the doc already exists and this write is silently blocked
      // by the rules — that's expected, not an error.
      try {
        await setDoc(doc(db, 'config', 'security'), { passwordHash });
      } catch (bootstrapErr) { /* already set — fine */ }

      // The real check: this only succeeds if passwordHash matches what's
      // stored in config/security. If someone bypasses the JS check above
      // via dev tools with the wrong password, Firestore rejects this.
      await setDoc(doc(db, 'adminSessions', user.uid), { passwordHash, createdAt: serverTimestamp() });
      setAdminSession();
      window.location.href = 'dashboard.html';
    } catch (err) {
      errorMsg.textContent = 'Could not sign in — check setup.';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
