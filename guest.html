<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>#ENJOY Vault</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#111111">
<script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }</script>
</head>
<body>
<div class="screen">
  <div class="guest-banner">You're viewing a shared link · expires 24h after it was created</div>
  <div class="topbar">
    <div class="brand">#ENJOY Vault</div>
  </div>
  <div class="feed" id="feed">
    <div class="loader">Checking link…</div>
  </div>
</div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, getDoc, setDoc, collection, query, where, orderBy, onSnapshot, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const feed = document.getElementById('feed');

const ICON_CAMERA = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8.5A1.5 1.5 0 0 1 5.5 7h2.2l1-1.6A1.5 1.5 0 0 1 10 4.6h4a1.5 1.5 0 0 1 1.3.8l1 1.6h2.2A1.5 1.5 0 0 1 20 8.5v9A1.5 1.5 0 0 1 18.5 19h-13A1.5 1.5 0 0 1 4 17.5z"/><circle cx="12" cy="12.5" r="3.4"/></svg>`;
const ICON_HOURGLASS = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12M6 21h12M7 3c0 5 5 6.5 5 9s-5 4-5 9M17 3c0 5-5 6.5-5 9s5 4 5 9"/></svg>`;

if (!token) {
  showExpired("This link isn't valid.");
} else {
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      signInAnonymously(auth).catch(() => showExpired("Couldn't verify this link — try again."));
      return;
    }
    await validateAndLoad(user);
  });
}

async function validateAndLoad(user) {
  try {
    const linkSnap = await getDoc(doc(db, 'shareLinks', token));
    if (!linkSnap.exists()) { showExpired("This link has expired or doesn't exist."); return; }

    const data = linkSnap.data();
    const expiresAt = data.expiresAt.toDate();
    if (expiresAt.getTime() < Date.now()) { showExpired("This link has expired."); return; }

    // Register this anonymous session as a valid guest until the same expiry
    await setDoc(doc(db, 'guestSessions', user.uid), { expiresAt: data.expiresAt });

    loadFeed();
  } catch (err) {
    showExpired("This link has expired or access could not be verified.");
  }
}

function loadFeed() {
  const q = query(collection(db, 'entries'), where('isLocked', '==', false), orderBy('date', 'desc'));
  onSnapshot(q, (snap) => {
    feed.innerHTML = '';
    if (snap.empty) {
      feed.innerHTML = `<div class="empty-state"><div class="glyph">${ICON_CAMERA}</div>Nothing to show yet.</div>`;
      return;
    }
    let lastDateStr = '';
    snap.forEach(d => {
      const entry = d.data();
      const dt = entry.date ? entry.date.toDate() : new Date();
      const dateStr = dt.toLocaleDateString(undefined, { year: 'numeric', month: 'long' });
      if (dateStr !== lastDateStr) {
        const h = document.createElement('div');
        h.className = 'date-heading';
        h.textContent = dateStr;
        feed.appendChild(h);
        lastDateStr = dateStr;
      }
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<img src="${entry.imageUrl}" loading="lazy"><div class="caption-overlay">${entry.caption || ''}</div>`;
      feed.appendChild(card);
    });
  }, () => showExpired("This link has expired."));
}

function showExpired(msg) {
  feed.innerHTML = `<div class="expired-box"><div class="glyph">${ICON_HOURGLASS}</div><h3>${msg}</h3><p style="color:var(--muted);">Ask for a new link.</p></div>`;
}
</script>
</body>
</html>
